<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Квиз</title>
<style>
  :root { color-scheme: dark; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    max-width: 720px; margin: 40px auto; padding: 0 20px;
    background: #1e1e1e; color: #e0ded6; line-height: 1.6;
  }
  h1 { font-weight: 500; font-size: 22px; }
  .counter { color: #8a8880; font-size: 14px; margin-bottom: 8px; }
  .card { border: 1px solid #3a3a38; border-radius: 10px; padding: 18px 20px; }
  .prompt { margin-bottom: 14px; }
  pre { background: #2a2a28; padding: 10px 12px; border-radius: 6px; overflow-x: auto; font-size: 14px; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 540px) { .options { grid-template-columns: 1fr; } }
  .opt {
    border: 1px solid #4a4a48; border-radius: 8px; padding: 10px 12px;
    cursor: pointer; background: #2a2a28; user-select: none;
  }
  .opt:hover { border-color: #6a6a68; }
  .opt.selected { border-color: #d85a30; background: #3a2c24; }
  .opt.correct { border-color: #7cc267; background: #26331f; }
  .opt.wrong { border-color: #e2726f; background: #38221f; }
  .opt.locked { cursor: default; }
  .opt.locked:hover { border-color: inherit; }
  .verdict { margin-top: 12px; font-size: 15px; min-height: 22px; }
  .ok { color: #7cc267; }
  .bad { color: #e2726f; }
  .skipped { color: #c9a86a; }
  .actions { margin-top: 14px; display: flex; gap: 10px; }
  .nav { margin-top: 18px; display: flex; justify-content: space-between; align-items: center; }
  button {
    padding: 9px 18px; font-size: 15px; border: none; border-radius: 8px;
    background: #d85a30; color: #fff; cursor: pointer;
  }
  button.secondary { background: #3a3a38; color: #e0ded6; }
  button:disabled { opacity: .45; cursor: default; }
  #result { white-space: pre-wrap; background: #2a2a28; padding: 14px; border-radius: 8px;
            margin-top: 16px; font-family: ui-monospace, monospace; font-size: 13px; display: none; }
  .hint { color: #8a8880; font-size: 13px; }
</style>
</head>
<body>
<h1>Квиз</h1>
<p class="hint">Выбери вариант и жми «Ответить» (ответ фиксируется, переответить нельзя).
Не знаешь — жми «Пропустить». В конце — «Завершить»: результат сохранится сам,
просто вернись в терминал.</p>

<!--
  ШАБЛОН. Claude Code заполняет массив QUESTIONS объектами:
  { id, prompt (может содержать HTML/<pre>), options: [строки], correct: индекс }
  options — правильный ответ + 2–3 ПРАВДОПОДОБНЫХ дистрактора: частые
  заблуждения, соседние понятия, «почти правильные» формулировки. Не пустышки.
  Порядок вариантов перемешивается при отображении автоматически.
-->
<script>
const QUESTIONS = [
  // ПРИМЕР — Claude Code заменяет содержимое под конкретный материал:
  { id: "q1",
    prompt: "Что выведет?<pre>def f(x, acc=[]):\n    acc.append(x); return acc\nprint(f(1)); print(f(2))</pre>",
    options: ["[1] затем [1, 2]", "[1] затем [2]", "[1] затем [1]", "UnboundLocalError"],
    correct: 0 },
  { id: "q2",
    prompt: "Какой оператор проверяет идентичность объектов (а не равенство значений)?",
    options: ["is", "==", "eq", "==="],
    correct: 0 },
];
</script>

<div class="counter" id="counter"></div>
<div class="card">
  <div class="prompt" id="prompt"></div>
  <div class="options" id="options"></div>
  <div class="verdict" id="verdict"></div>
  <div class="actions">
    <button id="submitBtn" onclick="submitAnswer()">Ответить</button>
    <button id="skipBtn" class="secondary" onclick="skipQuestion()">Пропустить</button>
  </div>
</div>
<div class="nav">
  <button id="prevBtn" class="secondary" onclick="go(-1)">← Назад</button>
  <button id="finishBtn" onclick="finish()">Завершить</button>
  <button id="nextBtn" class="secondary" onclick="go(1)">Вперёд →</button>
</div>
<div id="result"></div>

<script>
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// status: pending | correct | wrong | skipped; chosen — индекс в q.options;
// order — перемешанный порядок показа вариантов.
const state = QUESTIONS.map(q => ({
  status: "pending", chosen: null, order: shuffle([...q.options.keys()]),
}));
let cur = 0;

function render() {
  const q = QUESTIONS[cur], s = state[cur];
  document.getElementById("counter").textContent = `Вопрос ${cur + 1} из ${QUESTIONS.length}`;
  document.getElementById("prompt").innerHTML = q.prompt;

  const box = document.getElementById("options");
  box.innerHTML = "";
  const resolved = s.status !== "pending";
  s.order.forEach(oi => {
    const div = document.createElement("div");
    div.className = "opt";
    div.textContent = q.options[oi];
    if (resolved) {
      div.classList.add("locked");
      if (oi === q.correct) div.classList.add("correct");
      else if (oi === s.chosen) div.classList.add("wrong");
    } else {
      if (oi === s.chosen) div.classList.add("selected");
      div.onclick = () => { s.chosen = oi; render(); };
    }
    box.appendChild(div);
  });

  const v = document.getElementById("verdict");
  v.innerHTML = {
    pending: "",
    correct: '<span class="ok">✓ верно</span>',
    wrong: '<span class="bad">✗ мимо</span>',
    skipped: '<span class="skipped">— пропущено</span>',
  }[s.status];

  document.getElementById("submitBtn").disabled = resolved || s.chosen === null;
  document.getElementById("skipBtn").disabled = resolved;
  document.getElementById("prevBtn").disabled = cur === 0;
  document.getElementById("nextBtn").disabled = cur === QUESTIONS.length - 1;
}

function submitAnswer() {
  const q = QUESTIONS[cur], s = state[cur];
  if (s.status !== "pending" || s.chosen === null) return;
  s.status = s.chosen === q.correct ? "correct" : "wrong";
  render();
}

function skipQuestion() {
  if (state[cur].status !== "pending") return;
  state[cur].status = "skipped";
  render();
}

function go(d) {
  cur = Math.min(QUESTIONS.length - 1, Math.max(0, cur + d));
  render();
}

async function finish() {
  const pending = state.filter(s => s.status === "pending").length;
  if (pending > 0 &&
      !confirm(`Осталось без ответа: ${pending}. Они уйдут в пробелы как пропущенные. Завершить?`)) {
    return;
  }
  state.forEach(s => { if (s.status === "pending") s.status = "skipped"; });

  // В результат идут проваленные и пропущенные — материал для карточек.
  const gaps = state
    .map((s, i) => ({ s, q: QUESTIONS[i] }))
    .filter(({ s }) => s.status === "wrong" || s.status === "skipped")
    .map(({ s, q }) => ({
      prompt: q.prompt.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim(),
      expected: q.options[q.correct],
      given: s.chosen === null ? "" : q.options[s.chosen],
      verdict: s.status === "wrong" ? "wrong" : "skipped",
    }));
  const payload = JSON.stringify({ gaps }, null, 2);
  const btn = document.getElementById("finishBtn");
  try {
    const r = await fetch("/result", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: payload,
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    btn.disabled = true;
    btn.textContent = "✓ Сохранено — вернись в терминал";
  } catch (e) {
    // сервер недоступен — показываем JSON для ручного копирования
    const out = document.getElementById("result");
    out.style.display = "block";
    out.textContent = payload;
    alert("Не удалось отправить результат — скопируй JSON вручную");
  }
}

render();
</script>
</body>
</html>
